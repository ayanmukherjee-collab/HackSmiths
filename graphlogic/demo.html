<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Graph Demo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-top: 0; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 1.5rem; border-radius: 8px; overflow-x: auto; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Spatial Graph OCR Demo</h1>
        <p>The Javascript graph simulation is running directly in your browser. Below are the values it extracted using the schema:</p>
        <pre id="output">Running Graph Logic...</pre>
    </div>

    <script>
        class SpatialGraph {
            constructor(words) {
                this.nodes = words.map((w, index) => ({
                    id: index,
                    text: w.text,
                    x0: w.bbox.x0,
                    y0: w.bbox.y0,
                    x1: w.bbox.x1,
                    y1: w.bbox.y1,
                    cx: (w.bbox.x0 + w.bbox.x1) / 2,
                    cy: (w.bbox.y0 + w.bbox.y1) / 2,
                    right: null,
                    bottom: null,
                }));
                this.buildGraph();
            }

            buildGraph() {
                for (let i = 0; i < this.nodes.length; i++) {
                    let node = this.nodes[i];
                    
                    let rightCandidates = this.nodes.filter(n => 
                        n.id !== node.id &&
                        n.x0 >= node.x1 && 
                        n.cy >= node.y0 - 5 && n.cy <= node.y1 + 5
                    );
                    
                    if (rightCandidates.length > 0) {
                        rightCandidates.sort((a, b) => (a.x0 - node.x1) - (b.x0 - node.x1));
                        node.right = rightCandidates[0];
                    }

                    let bottomCandidates = this.nodes.filter(n =>
                        n.id !== node.id &&
                        n.y0 >= node.y1 && 
                        n.cx >= node.x0 - 10 && n.cx <= node.x1 + 10
                    );
                    
                    if (bottomCandidates.length > 0) {
                        bottomCandidates.sort((a, b) => (a.y0 - node.y1) - (b.y0 - node.y1));
                        node.bottom = bottomCandidates[0];
                    }
                }
            }

            findNodeByText(text) {
                return this.nodes.find(n => n.text.toLowerCase().includes(text.toLowerCase()));
            }

            extract(schema) {
                const result = {};
                for (const key in schema) {
                    const config = schema[key];
                    const startNode = this.findNodeByText(config.search_text || key);
                    
                    if (!startNode) {
                        result[key] = null;
                        continue;
                    }

                    result[key] = this.getValueForNode(startNode, config.direction);
                }
                return result;
            }

            getValueForNode(startNode, direction) {
                let nextNode = startNode[direction];
                if (!nextNode) return null;

                let valueTokens = [nextNode.text];
                let rNode = nextNode.right;
                let maxLimit = 10; 
                while (rNode && maxLimit > 0) {
                    valueTokens.push(rNode.text);
                    rNode = rNode.right;
                    maxLimit--;
                }

                return valueTokens.join(' ').trim();
            }
        }

        // Mock data
        const mockOCRWords = [
            { text: 'Invoice', bbox: { x0: 10, y0: 10, x1: 60, y1: 25 } },
            { text: 'No:',     bbox: { x0: 65, y0: 10, x1: 90, y1: 25 } },
            { text: 'INV-1002',bbox: { x0: 150,y0: 10, x1: 220,y1: 25 } },
            
            { text: 'Date:',   bbox: { x0: 10, y0: 35, x1: 50, y1: 50 } },
            { text: '2026-04-18', bbox: { x0: 150, y0: 35, x1: 230, y1: 50 } },

            { text: 'Grand',   bbox: { x0: 10, y0: 80, x1: 60, y1: 95 } },
            { text: 'Total',   bbox: { x0: 65, y0: 80, x1: 100, y1: 95 } },
            { text: '$1,500.00', bbox: { x0: 150, y0: 80, x1: 220, y1: 95 } },
            
            { text: 'Amount',  bbox: { x0: 10, y0: 110, x1: 60, y1: 125 } },
            { text: 'Due:',    bbox: { x0: 65, y0: 110, x1: 100, y1: 125 } },
            { text: '$500.00', bbox: { x0: 20, y0: 140, x1: 100, y1: 155 } } 
        ];

        console.log("Building Spatial Graph...");
        const graph = new SpatialGraph(mockOCRWords);

        const schema = {
            "invoice_id": { search_text: "Invoice No", direction: "right" },
            "invoice_date": { search_text: "Date", direction: "right" },
            "total_amount": { search_text: "Grand Total", direction: "right" },
            "amount_due": { search_text: "Due:", direction: "bottom" }
        };

        console.log("Extracting Data...");
        const extractedData = graph.extract(schema);

        // Display output
        document.getElementById("output").textContent = JSON.stringify(extractedData, null, 2);
    </script>
</body>
</html>
